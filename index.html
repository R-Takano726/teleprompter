<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プロンプター</title>
  <style>
    :root {
      --bg: #0e1119;
      --panel: #161b27;
      --panel-soft: #1c2330;
      --border: #2a3142;
      --text: #e7ebf3;
      --muted: #8b94a7;
      --accent: #4fc3f7;
      --accent-d: #0288d1;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Yu Gothic', sans-serif;
      background: radial-gradient(1100px 700px at 50% -12%, rgba(79,195,247,0.07), transparent), var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ==================== Edit Screen ==================== */
    #editScreen {
      display: flex;
      justify-content: center;
      height: 100vh;
      padding: 24px;
      overflow: auto;
    }

    .edit-card {
      width: 100%;
      max-width: 840px;
      margin: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .edit-head {
      text-align: center;
    }

    #editScreen h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 7px;
    }

    .edit-sub {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 1.5px;
      margin-top: 6px;
    }

    #scriptInput {
      flex: 1;
      min-height: 240px;
      background: #0b0e16;
      color: #eef1f7;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      font-size: 15px;
      line-height: 1.8;
      resize: none;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #scriptInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79, 195, 247, 0.15);
    }

    #scriptInput::placeholder {
      color: #4a5160;
    }

    .settings-row {
      display: flex;
      gap: 14px;
      align-items: stretch;
      flex-wrap: wrap;
    }

    .setting-group {
      flex: 1;
      min-width: 210px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
    }

    .setting-group label {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 1px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .setting-group .val {
      color: var(--accent);
      font-weight: 700;
      font-size: 16px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .mirror-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .toggle-btn {
      flex: 1;
      padding: 9px 14px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: var(--panel-soft);
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      transition: all 0.15s;
    }

    .toggle-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .toggle-btn.active {
      background: var(--accent);
      color: #06121b;
      border-color: var(--accent);
      font-weight: 700;
      box-shadow: 0 2px 12px rgba(79, 195, 247, 0.3);
    }

    .legend {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: center;
      font-size: 11px;
      color: var(--muted);
    }

    .legend span {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend i {
      width: 11px;
      height: 11px;
      border-radius: 3px;
      display: inline-block;
    }

    /* クラウド同期(台本のMac↔iPad共有) */
    .cloud-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .cloud-btn {
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: var(--panel-soft);
      color: #cfd6e4;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      transition: all 0.15s;
    }

    .cloud-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .cloud-btn:active {
      transform: translateY(1px);
    }

    .cloud-status {
      font-size: 12px;
      color: var(--muted);
      margin-left: auto;
    }

    #startBtn {
      align-self: stretch;
      padding: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent-d));
      color: #06121b;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 2px;
      transition: transform 0.1s, box-shadow 0.2s, filter 0.2s;
      box-shadow: 0 6px 24px rgba(79, 195, 247, 0.3);
    }

    #startBtn:hover {
      filter: brightness(1.06);
      transform: translateY(-1px);
      box-shadow: 0 10px 30px rgba(79, 195, 247, 0.4);
    }

    #startBtn:active {
      transform: translateY(0);
    }

    /* ==================== Prompter Screen ==================== */
    #prompterScreen {
      display: none;
      flex-direction: column;
      height: 100vh;
      background: #000;
      position: relative;
    }

    /* テキスト表示エリア(スクロール)＋上下フェードの土台 */
    .stage {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #prompterWrapper {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      overflow: scroll;
      scrollbar-width: none;
    }

    #prompterWrapper::-webkit-scrollbar {
      display: none;
    }

    /* 上下端をふわっと暗くして視線を中央へ集める(プロンプターらしさ) */
    .fade-top, .fade-bottom {
      position: absolute;
      left: 0;
      right: 0;
      pointer-events: none;
      z-index: 5;
    }

    .fade-top {
      top: 0;
      height: 14%;
      background: linear-gradient(to bottom, #000 10%, transparent);
    }

    .fade-bottom {
      bottom: 0;
      height: 16%;
      background: linear-gradient(to top, #000 10%, transparent);
    }

    #prompterContent {
      padding: 30vh 5% 80vh;
      font-size: 32px;
      line-height: 1.6;
      color: #fff;
      width: 100%;
      word-break: break-word;
      overflow-wrap: break-word;
      white-space: pre-wrap;
    }

    /* 左右反転: レイアウト全体を鏡映 (ビームスプリッタ用) */
    #prompterContent.mirror-h {
      transform: scaleX(-1);
    }

    /* 上下反転: 表示ビューポート(見えている枠)ごと上下反転する。
       鏡は像を1軸反転させるので、画面側で同じ軸をあらかじめ反転しておくと
       二重反転で「正立・行は上→下・スクロールは上方向」に戻り正しく読める。
       ※コンテンツ全体(scaleY)だと台本末尾から始まり、文字単位だと鏡越しに
         行順とスクロールが逆になる。ビューポート単位が唯一正しい。
       ※つまり画面を直接見ると上下逆に見えるのが正常(鏡越しが正)。 */
    #prompterWrapper.mirror-v {
      transform: scaleY(-1);
    }

    /* 音声追従中: いま喋っている行をうっすら帯ハイライト(現在地の目印) */
    #prompterContent .line.reading {
      background: rgba(79, 195, 247, 0.16);
      border-radius: 6px;
    }

    /* カラオケ式: 読み終えた文字を色付け(左から流れていく) */
    #prompterContent .ch.spoken {
      color: #ffd54f;
    }

    /* 読み間違い/読み飛ばした文字を赤く表示(spokenより優先) */
    #prompterContent .ch.misread {
      color: #ff5252;
      font-weight: bold;
    }

    /* 迷子: 喋っているのに台本に追従できていない行(読み間違い/言い換え) */
    #prompterContent .line.reading.diverged {
      background: rgba(255, 152, 0, 0.28);
    }

    /* 英単語・型番などを途中改行させない */
    #prompterContent .word {
      white-space: nowrap;
    }

    /* Markdown heading colors */
    #prompterContent .h1 {
      color: #ffeb3b;
      font-weight: bold;
      font-size: 1.2em;
      margin: 0.2em 0 0.1em;
      display: block;
    }

    #prompterContent .h2 {
      color: #4fc3f7;
      font-weight: bold;
      font-size: 1.1em;
      margin: 0.15em 0 0.05em;
      display: block;
    }

    #prompterContent .h3 {
      color: #a5d6a7;
      font-weight: bold;
      font-size: 1.0em;
      margin: 0.1em 0 0.05em;
      display: block;
    }

    #prompterContent .empty-line {
      display: block;
      height: 0.4em;
    }

    /* Markdown list items */
    #prompterContent .li-ul,
    #prompterContent .li-ol {
      display: block;
      padding-left: 1.8em;
      position: relative;
    }

    #prompterContent .li-marker {
      position: absolute;
      left: 0;
    }

    #prompterContent .li-ul .li-marker {
      color: #4fc3f7;
    }

    #prompterContent .li-ol .li-marker {
      color: #ffb74d;
      min-width: 1.6em;
      display: inline-block;
    }

    /* ==================== Prompter Controls ==================== */
    #prompterControls {
      background: rgba(14, 17, 25, 0.92);
      border-top: 1px solid var(--border);
      padding: 10px 12px;
      display: flex;
      gap: 7px;
      align-items: center;
      flex-wrap: wrap;
      flex-shrink: 0;
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
    }

    #prompterControls .toggle-btn {
      flex: 0 0 auto;
      padding: 8px 12px;
      font-size: 13px;
    }

    .ctrl-btn {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: var(--panel-soft);
      color: #cfd6e4;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .ctrl-btn:hover {
      background: #252c3b;
      border-color: #3a445a;
    }

    .ctrl-btn:active {
      transform: translateY(1px);
    }

    #playBtn {
      background: linear-gradient(135deg, #1f3b22, #16301a);
      color: #b6e6b3;
      border-color: #2f5a31;
      font-weight: 700;
      min-width: 104px;
    }

    #playBtn:hover {
      background: linear-gradient(135deg, #264826, #1c3a1f);
    }

    #stopBtn {
      color: #f1a3a3;
      border-color: #4a2326;
      background: #1f1416;
    }

    #stopBtn:hover {
      background: #2a1a1c;
    }

    .ctrl-group {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 11px;
      padding: 3px 7px 3px 10px;
    }

    .ctrl-group .ctrl-btn {
      padding: 6px 11px;
      border-radius: 8px;
    }

    .ctrl-group-label {
      font-size: 11px;
      color: var(--muted);
      margin-right: 3px;
      letter-spacing: 1px;
    }

    .ctrl-val {
      color: var(--accent);
      font-size: 14px;
      font-weight: 700;
      min-width: 30px;
      text-align: center;
    }

    .separator {
      width: 1px;
      height: 26px;
      background: var(--border);
      margin: 0 2px;
    }

    .shortcut-hint {
      font-size: 11px;
      color: #565f70;
      margin-left: auto;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    @media (max-width: 1100px) {
      .shortcut-hint {
        display: none;
      }
    }

    /* 狭い画面(iPad横など)はバーを詰めて1行に収める */
    @media (max-width: 1040px) {
      #prompterControls { gap: 6px; }
      .ctrl-btn { padding: 7px 10px; font-size: 12px; }
      #prompterControls .toggle-btn { padding: 7px 10px; font-size: 12px; }
      .ctrl-group { padding: 2px 6px 2px 8px; }
      #playBtn { min-width: 92px; }
    }

    /* ==================== 見出しジャンプ ==================== */
    #tocPanel {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      max-height: 55%;
      overflow: auto;
      background: rgba(14, 17, 25, 0.96);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 6px;
      z-index: 20;
      display: none;
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
    }

    .toc-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 11px 12px;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
    }

    .toc-item:last-child { border-bottom: none; }
    .toc-item:hover { background: rgba(79, 195, 247, 0.12); }
    /* 見出し色は本文の h1/h2/h3 と揃える */
    .toc-1 { color: #ffeb3b; }
    .toc-2 { color: #4fc3f7; padding-left: 26px; }
    .toc-3 { color: #a5d6a7; padding-left: 40px; }

    /* ==================== 開始カウントダウン ==================== */
    #countdownOverlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 30;
      pointer-events: none; /* 表示中も操作バーを触れるように */
    }

    #countdownOverlay .count-num {
      font-size: 200px;
      font-weight: 700;
      color: var(--accent);
      text-shadow: 0 0 50px rgba(79, 195, 247, 0.5);
    }

    /* ミラーリグ越しでも数字が正しく読めるよう、本文の反転設定に追従 */
    #countdownOverlay.mirror-h { transform: scaleX(-1); }
    #countdownOverlay.mirror-v { transform: scaleY(-1); }
    #countdownOverlay.mirror-h.mirror-v { transform: scale(-1, -1); }

    /* ==================== 読み間違いサマリー(編集画面) ==================== */
    #misreadSummary {
      background: #1f1416;
      border: 1px solid #4a2326;
      border-radius: 14px;
      padding: 14px 16px;
      display: none;
      flex-direction: column;
      gap: 8px;
      font-size: 14px;
    }

    #misreadSummary .mis-head {
      color: #f1a3a3;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    #misreadSummary .mis-item {
      color: #cfd6e4;
      line-height: 1.7;
    }

    #misreadSummary .mr {
      color: #ff5252;
      font-weight: 700;
    }

    #misreadSummary .cloud-btn { align-self: flex-end; }
  </style>
</head>
<body>

  <!-- ==================== Edit Screen ==================== -->
  <div id="editScreen">
    <div class="edit-card">
      <div class="edit-head">
        <h1>TELEPROMPTER</h1>
        <div class="edit-sub">台本を貼り付けて開始 ・ 🎤 音声追従で喋ったペースに自動スクロール</div>
      </div>

      <div class="cloud-row">
        <button class="cloud-btn" id="cloudSaveBtn">☁ クラウドに保存</button>
        <button class="cloud-btn" id="cloudLoadBtn">☁ クラウドから取得</button>
        <span class="cloud-status" id="cloudStatus">クラウド同期：—</span>
      </div>

      <textarea
        id="scriptInput"
        placeholder="台本をここに貼り付けてください...&#10;&#10;Markdown形式に対応しています:&#10;# 大見出し (黄色)&#10;## 中見出し (水色)&#10;### 小見出し (緑色)&#10;- 箇条書き (水色の•)&#10;1. 番号付きリスト (オレンジの番号)"
      ></textarea>

      <div class="settings-row">
        <div class="setting-group">
          <label><span>スクロール速度</span><span class="val" id="speedVal">2</span></label>
          <input type="range" id="speedRange" min="1" max="20" value="2">
        </div>
        <div class="setting-group">
          <label><span>フォントサイズ</span><span><span class="val" id="fontVal">60</span> px</span></label>
          <input type="range" id="fontRange" min="16" max="80" value="60">
        </div>
        <div class="setting-group">
          <label><span>表示の反転</span></label>
          <div class="mirror-row">
            <button class="toggle-btn active" id="mirrorHBtn">左右</button>
            <button class="toggle-btn" id="mirrorVBtn">上下</button>
          </div>
        </div>
      </div>

      <div class="legend">
        <span><i style="background:#ffd54f"></i>読んだ所</span>
        <span><i style="background:#ff5252"></i>読み間違い</span>
        <span><i style="background:#ffb74d"></i>台本から逸脱</span>
        <span style="color:#5b6478">※音声追従中に表示</span>
      </div>

      <div id="misreadSummary"></div>

      <button id="startBtn">▶ プロンプター開始</button>
    </div>
  </div>

  <!-- ==================== Prompter Screen ==================== -->
  <div id="prompterScreen">
    <div class="stage">
      <div id="prompterWrapper">
        <div id="prompterContent"></div>
      </div>
      <div class="fade-top"></div>
      <div class="fade-bottom"></div>
      <div id="tocPanel"></div>
      <div id="countdownOverlay"><span class="count-num" id="countNum">3</span></div>
    </div>

    <div id="prompterControls">
      <button class="ctrl-btn" id="stopBtn">✕ 終了</button>

      <div class="separator"></div>

      <button class="ctrl-btn" id="playBtn">⏸ 一時停止</button>

      <button class="ctrl-btn" id="rewindBtn">⏪ 戻る</button>
      <button class="ctrl-btn" id="forwardBtn">進む ⏩</button>
      <button class="ctrl-btn" id="tocBtn">☰ 見出し</button>

      <div class="separator"></div>

      <div class="ctrl-group">
        <span class="ctrl-group-label">速度</span>
        <button class="ctrl-btn" id="speedDownBtn">−</button>
        <span class="ctrl-val" id="speedDisplay">5</span>
        <button class="ctrl-btn" id="speedUpBtn">＋</button>
      </div>

      <div class="ctrl-group">
        <span class="ctrl-group-label">サイズ</span>
        <button class="ctrl-btn" id="fontDownBtn">A−</button>
        <span class="ctrl-val" id="fontDisplay">60</span>
        <button class="ctrl-btn" id="fontUpBtn">A＋</button>
      </div>

      <div class="separator"></div>

      <div class="ctrl-group">
        <span class="ctrl-group-label">反転</span>
        <button class="toggle-btn active" id="pMirrorHBtn">左右</button>
        <button class="toggle-btn" id="pMirrorVBtn">上下</button>
      </div>

      <div class="separator"></div>

      <button class="toggle-btn" id="voiceBtn" title="喋ったペースに合わせて自動でスクロール">🎤 音声追従</button>

      <span class="shortcut-hint">
        スペース: 一時停止 &nbsp;|&nbsp; ←→ / ↑↓: 移動 &nbsp;|&nbsp; +−: 速度 &nbsp;|&nbsp; ホイール: スクロール
      </span>
    </div>
  </div>

  <script>
    /* ============================================================
       テレプロンプター メインスクリプト
       構成:
         1. 設定定数   … チューニングはこのブロックだけ触れば良い
         2. DOM参照
         3. 状態
         4. 台本レンダラ … DOM構築＋音声照合インデックスの同時生成
         5. 表示ヘルパー … 速度/フォント/反転/画面高さ
         6. スクロール・アニメーション
         7. 音声追従   … 認識・照合・カラオケ/赤/オレンジ表示
         8. クラウド同期 … Mac↔iPadの台本共有
         9. イベント接続・初期化
       ============================================================ */

    // ==================== 1. 設定定数 ====================
    // --- スクロール・表示 ---
    const STEP_AMOUNT = 300;        // 戻る/進む・矢印キーの1回の移動量(px)
    const SPEED_MIN = 1, SPEED_MAX = 20;
    const SPEED_PX_FACTOR = 15;     // speed 1-20 → 15-300 px/sec
    const FONT_MIN = 16, FONT_MAX = 80, FONT_STEP = 4;
    const TOUCH_SCROLL_RATE = 1.5;  // スワイプ移動量の倍率
    const READ_POS_RATIO = 0.4;     // 読み位置を画面の上から40%に置く

    // --- 音声追従(照合) ---
    const VOICE_EASE = 4;           // 追従のなめらかさ(大きいほど速く追従)
    const VOICE_THROTTLE_MS = 150;  // 認識結果の処理間引き(旧iPad負荷対策)
    const MANUAL_IGNORE_MS = 500;   // 手動補正直後は音声で戻さない時間
    const SEARCH_BEHIND = 40;       // 言い直し・小さな戻りを許容する後方探索幅
    const SEARCH_AHEAD = 400;       // 飛びすぎ防止の前方探索幅
    const MAX_MATCH_LEN = 16;       // 照合に使う認識末尾の最大文字数

    // ==================== 7. 音声追従 ====================

    // 句読点・空白を落とし、文字/数字のみ小文字化して照合用に正規化
    function normalizeText(s) {

    function bodySkip(a, b) {

    function rangeForIndex() {

      for (let i = 0; i < voiceLineRanges.length; i++) {
        if (voiceIndex < voiceLineRanges[i].end || i === voiceLineRanges.length - 1) {
          return voiceLineRanges[i];
        }

      return voiceLineRanges[voiceLineRanges.length - 1];

    // いま喋っている行をハイライト(色変更)。切り替わった時だけDOMを触る。
    function setReadingHighlight(el) {
      if (readingEl === el) return;
      if (readingEl) readingEl.classList.remove('reading', 'diverged');
      readingEl = el || null;
      if (readingEl) readingEl.classList.add('reading');
    }

    // カラオケ式ハイライト: voiceIndex までの文字に .spoken を付与/解除(増分処理で軽量)
    function updateKaraoke() {
      while (spokenCount < voiceChars.length && voiceChars[spokenCount].normPos <= voiceIndex) {
        voiceChars[spokenCount].span.classList.add('spoken');
        spokenCount++;
      }
      while (spokenCount > 0 && voiceChars[spokenCount - 1].normPos > voiceIndex) {
        spokenCount--;
        voiceChars[spokenCount].span.classList.remove('spoken');
      }
    }

    // norm位置 (from, to] に含まれる文字spanの .misread(赤) を付与/除去する
    function setMisread(from, to, on) {
      for (let i = 0; i < voiceChars.length; i++) {
        const p = voiceChars[i].normPos;
        if (p <= from) continue;
        if (p > to) break;
        if (on && voiceChars[i].head) continue; // 見出しは読み飛ばしても赤くしない
        voiceChars[i].span.classList.toggle('misread', on);
      }
    }

    // voiceIndex(norm内位置) → 追従先スクロール位置(px)を算出＋現在行をハイライト
    function voiceIndexToTarget() {
      const range = rangeForIndex();
      if (!range) return;
      setReadingHighlight(range.el);
      updateKaraoke();
      const frac = (voiceIndex - range.start) / Math.max(1, range.end - range.start);
      const y = range.el.offsetTop + frac * range.el.offsetHeight;
      voiceTarget = y - prompterWrapper.clientHeight * READ_POS_RATIO;
    }

    // 現在のスクロール位置(画面40%)に対応する norm 位置を返す
    function readingNormIndex() {
      const y = scrollPos + prompterWrapper.clientHeight * READ_POS_RATIO;
      for (const r of voiceLineRanges) {
        if (y <= r.el.offsetTop + r.el.offsetHeight) return r.start;
      }
      return voiceNorm.length;
    }

    // 手動補正時: 音声の基準を今の表示位置に合わせ、勝手に元へ戻らないようにする。
    // 手動ドラッグで連続発火するので、1フレーム1回に間引く(古いiPad対策)。
    function anchorVoiceToScroll() {
      if (!voiceMode) return;
      voiceTarget = null; // 即時に無効化(次フレームで旧ターゲットへ引き戻されないよう同期で行う)
      if (anchorScheduled) return;
      anchorScheduled = true;
      requestAnimationFrame(() => {
        anchorScheduled = false;
        if (!voiceMode) return;
        voiceIndex = readingNormIndex();
        voiceTarget = null; // 次に喋るまで動かさない
        const range = rangeForIndex();
        if (range) setReadingHighlight(range.el);
        updateKaraoke();
        lastManualAnchorAt = nowMs();
        lastAdvanceAt = nowMs(); // 手動補正直後は迷子扱いしない
        stalledSinceAdvance = false;
      });
    }

    // 認識テキストの末尾と台本を照合し、追従先スクロール位置を更新
    function updateVoicePosition(transcript) {
      if (!voiceMode || !isPlaying || !voiceNorm) return;
      const now = nowMs();
      if (now - lastVoiceProc < VOICE_THROTTLE_MS) return;      // 旧iPadの負荷軽減: 処理を間引く
      if (now - lastManualAnchorAt < MANUAL_IGNORE_MS) return;  // 手動補正直後は音声で戻さない
      lastVoiceProc = now;

      const spoken = normalizeText(transcript);
      if (spoken.length < MIN_MATCH_LEN) return; // 短すぎる断片は誤マッチしやすいので無視

      // 現在地の少し手前〜前方だけを探索窓にする(長文台本でも軽い & 言い直しに対応)
      const hayStart = Math.max(0, voiceIndex - SEARCH_BEHIND);
      const hay = voiceNorm.slice(hayStart, Math.min(voiceNorm.length, voiceIndex + SEARCH_AHEAD));

      // 末尾を長め→短めに試し、採用候補が取れた長さで確定する(より長い一致=高確信を優先)。
      // 採用可: 後退(=言い直し) / 近接の前進 / 長い一致(高確信)。
      // 前方ジャンプの可否は「飛ばした本文の文字数」で判定。見出しの飛ばしは除外されるので、
      // 見出しを読まずに本文へ進んでもブロックされない(=引き戻されない)。
      // 読み間違い対策: 短い一致での大きな前方ジャンプは採用しない(誤読/偶然一致は無視して現在地を保つ)。
      //   例:「具体的には」を先にある「物理的に」と読んでも飛ばない。続けて正しい語を読めば近接一致で再追従。
      let bestEnd = -1, bestScore = Infinity, bestLen = 0;
      for (let L = Math.min(MAX_MATCH_LEN, spoken.length); L >= MIN_MATCH_LEN; L--) {
        const needle = spoken.slice(-L);
        let from = 0, foundEligible = false;
        while (true) {
          const rel = hay.indexOf(needle, from);
          if (rel === -1) break;
          const end = hayStart + rel + L;
          const diff = end - voiceIndex;
          const matchStartPos = end - L;
          const bodyGap = matchStartPos > voiceIndex ? bodySkip(voiceIndex, matchStartPos) : 0;
          const eligible = bodyGap <= MAX_NEAR_JUMP || L >= CONFIDENT_LEN;
          if (eligible) {
            const score = diff >= 0 ? diff : (-diff) * BACK_PENALTY; // 後退は割高に
            if (score < bestScore) { bestScore = score; bestEnd = end; bestLen = L; }
            foundEligible = true;
          }
          from = rel + 1;
        }
        if (foundEligible) break;
      }
      if (bestEnd === -1) { stalledSinceAdvance = true; return; } // 一致せず停止(誤読語で起きる)

      const prevIndex = voiceIndex;
      voiceIndex = bestEnd;
      lastAdvanceAt = now; // 台本に一致して進んだ=迷子解除
      voiceIndexToTarget();

      // 読み間違い検知: 「誤読語で一旦マッチが止まり、続けて正しい語で先へ飛ぶ」順序のときだけ、
      // 飛ばされた隙間(=誤読/読み飛ばした語)を赤くマークする。停止なしの前方スキップや
      // 暫定認識のブレ・ASRの取りこぼしは赤にしない(偽陽性を抑制)。
      const matchStart = bestEnd - bestLen;
      const gap = matchStart - prevIndex;
      // 一致した区間は正しく読めた証拠なので赤を消す(言い直して正しく読み直すと赤が取れる)
      setMisread(matchStart, bestEnd, false);
      if (stalledSinceAdvance && gap >= 1 && gap <= MISREAD_MAX) setMisread(prevIndex, matchStart, true);
      stalledSinceAdvance = false;
    }

    // ---------- 認識のライフサイクル ----------
    // 認識を動かすべき条件: ユーザーがONにしていて、かつ再生中(=一時停止中は止めて省電力)
    function shouldListen() { return voiceWantOn && isPlaying; }

    // start()重複(InvalidStateError)を防ぐ安全な開始。starting/runningの間は呼ばない。
    function safeStart() {
      if (!recognition || recognitionRunning || recognitionStarting) return;
      recognitionStarting = true;
      try { recognition.start(); } catch (_) { recognitionStarting = false; }
    }

    function scheduleVoiceRestart(delay) {
      if (restartTimer) return; // 二重予約しない(再起動ループ防止)
      restartTimer = setTimeout(() => {
        restartTimer = null;
        if (shouldListen()) safeStart();
      }, delay);
    }

    function setupRecognition() {
      const r = new SR();
      r.lang = 'ja-JP';
      r.continuous = true;
      r.interimResults = true;
      r.onstart = () => { recognitionStarting = false; recognitionRunning = true; };
      r.onresult = (e) => {
        lastResultAt = nowMs(); // 喋っている証拠(迷子判定用)
        const last = e.results[e.results.length - 1];
        if (last) updateVoicePosition(last[0].transcript);
      };
      r.onend = () => {
        recognitionStarting = false;
        recognitionRunning = false;
        // iOS Safari等は勝手に止まるので、ONのままなら少し待って再開(間隔を空けてループ防止)
        if (shouldListen()) scheduleVoiceRestart(RESTART_DELAY_MS);
      };
      r.onerror = (e) => {
        recognitionStarting = false;
        if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
          stopVoice();
          alert('マイクが使えませんでした。設定でマイク許可を確認してください。');
        }
        // no-speech / aborted / network 等は onend → 再開に任せる(間隔あり)
      };
      return r;
    }

    // 状態に合わせて認識を開始/停止する一元化ヘルパー
    function syncVoiceRecognition() {
      if (!recognition) return;
      if (shouldListen()) {
        safeStart();
      } else {
        if (restartTimer) { clearTimeout(restartTimer); restartTimer = null; }
        if (recognitionRunning || recognitionStarting) { try { recognition.stop(); } catch (_) {} }
      }
    }

    function updateVoiceBtn() {
      voiceBtn.classList.toggle('active', voiceMode);
      voiceBtn.textContent = voiceMode ? '🎤 音声追従 ON' : '🎤 音声追従';
    }

    function startVoice() {
      if (!SR) { alert('この端末/ブラウザは音声認識に対応していません。'); return; }
      if (!recognition) recognition = setupRecognition();
      cancelCountdown(); // 音声追従は喋るまで動かないのでカウント不要、即開始
      voiceWantOn = true;
      voiceMode = true;
      lastResultAt = 0;       // 開始直後は迷子扱いしない
      lastAdvanceAt = nowMs();
      stalledSinceAdvance = false;
      // 照合インデックスは buildPrompter(描画時)で構築済み。今の表示位置から追従を再開。
      anchorVoiceToScroll();
      // 追従できるよう再生状態にする
      if (!isPlaying) { isPlaying = true; updatePlayBtn(); if (!rafId) startAnimation(); }
      syncVoiceRecognition();
      updateVoiceBtn();
    }

    function stopVoice() {
      voiceWantOn = false;
      voiceMode = false;
      voiceTarget = null;
      setReadingHighlight(null); // ハイライト解除
      if (restartTimer) { clearTimeout(restartTimer); restartTimer = null; }
      if (recognition && (recognitionRunning || recognitionStarting)) { try { recognition.stop(); } catch (_) {} }
      updateVoiceBtn();
    }

    // ==================== 8. クラウド同期(台本のMac↔iPad共有) ====================
    // Macで貼り付け→自動保存→iPadで開くと自動で読み込む。ログイン不要・本人専用の保存先。
    function setCloudStatus(msg) { cloudStatus.textContent = 'クラウド同期：' + msg; }

    function nowHM() {
      const d = new Date();
      return ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2);
    }

    async function saveToCloud(manual) {
      try {
        if (manual) setCloudStatus('保存中…');
        const res = await fetch(CLOUD_URL, {
          method: 'PUT',
          headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
          body: JSON.stringify({ text: scriptInput.value, updatedAt: Date.now() })
        });
        if (!res.ok) throw 0;
        setCloudStatus('保存しました ' + nowHM());
      } catch (e) {
        setCloudStatus('保存できませんでした(オフライン?)');
      }
    }

    async function loadFromCloud(manual) {
      try {
        setCloudStatus('取得中…');
        const res = await fetch(CLOUD_URL, { cache: 'no-store' });
        if (!res.ok) throw 0;
        const data = await res.json();
        const text = (data && typeof data.text === 'string') ? data.text : '';
        if (!text) { setCloudStatus(manual ? 'クラウドに台本はまだありません' : '—'); return; }
        // 自動取得時、既に別の内容を入力済みなら上書きせず通知だけ(手動取得で反映)
        if (!manual && scriptInput.value.trim() !== '' && scriptInput.value !== text) {
          setCloudStatus('クラウドに新しい台本あり（「取得」で反映）');
          return;
        }
        scriptInput.value = text;
        setCloudStatus('読み込みました ' + nowHM());
      } catch (e) {
        setCloudStatus(manual ? '取得できませんでした(オフライン?)' : '—');
      }
    }

    // ==================== 9. イベント接続・初期化 ====================
    // --- 編集画面 ---
    speedRange.addEventListener('input', () => setSpeed(parseInt(speedRange.value)));
    fontRange.addEventListener('input', () => setFontSize(parseInt(fontRange.value)));
    mirrorHBtn.addEventListener('click', () => setMirror(!mirrorH, mirrorV));
    mirrorVBtn.addEventListener('click', () => setMirror(mirrorH, !mirrorV));
    startBtn.addEventListener('click', startPrompter);

    // --- プロンプター操作バー ---
    stopBtn.addEventListener('click', stopPrompter);
    playBtn.addEventListener('click', togglePlay);
    rewindBtn.addEventListener('click', () => manualScrollBy(-STEP_AMOUNT));
    forwardBtn.addEventListener('click', () => manualScrollBy(STEP_AMOUNT));
    speedDownBtn.addEventListener('click', () => setSpeed(speed - 1));
    speedUpBtn.addEventListener('click', () => setSpeed(speed + 1));
    fontDownBtn.addEventListener('click', () => setFontSize(fontSize - FONT_STEP));
    fontUpBtn.addEventListener('click', () => setFontSize(fontSize + FONT_STEP));
    pMirrorHBtn.addEventListener('click', () => setMirror(!mirrorH, mirrorV));
    pMirrorVBtn.addEventListener('click', () => setMirror(mirrorH, !mirrorV));
    voiceBtn.addEventListener('click', () => { if (voiceMode) stopVoice(); else startVoice(); });
    tocBtn.addEventListener('click', toggleToc);

    // --- ホイール・スワイプ ---
    prompterWrapper.addEventListener('wheel', (e) => {
      e.preventDefault();
      manualScrollBy(e.deltaY);
    }, { passive: false });

    prompterWrapper.addEventListener('touchstart', (e) => {
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    prompterWrapper.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const y = e.touches[0].clientY;
      manualScrollBy((touchStartY - y) * TOUCH_SCROLL_RATE);
      touchStartY = y;
    }, { passive: false });

    // --- キーボード(プロンプター表示中のみ) ---
    document.addEventListener('keydown', (e) => {
      if (prompterScreen.style.display !== 'flex') return;
      switch (e.key) {
        case ' ':
          e.preventDefault();
          togglePlay();
          break;
        case 'ArrowLeft':
        case 'ArrowUp':
          e.preventDefault();
          manualScrollBy(-STEP_AMOUNT);
          break;
        case 'ArrowRight':
        case 'ArrowDown':
          e.preventDefault();
          manualScrollBy(STEP_AMOUNT);
          break;
        case '+':
        case '=':
          setSpeed(speed + 1);
          break;
        case '-':
        case '_':
          setSpeed(speed - 1);
          break;
      }
    });

    // --- ウィンドウ ---
    window.addEventListener('resize', syncPrompterHeight);
    window.addEventListener('orientationchange', () => setTimeout(syncPrompterHeight, 200));

    // --- クラウド同期 ---
    cloudSaveBtn.addEventListener('click', () => saveToCloud(true));
    cloudLoadBtn.addEventListener('click', () => loadFromCloud(true));
    // 入力が止まったら自動保存(Macでそのまま貼れば勝手にクラウドへ)。
    // プログラムからの value 代入では input は発火しないので、自動取得が保存を誘発することはない。
    scriptInput.addEventListener('input', () => {
      clearTimeout(cloudSaveTimer);
      setCloudStatus('編集中…');
      cloudSaveTimer = setTimeout(() => saveToCloud(false), CLOUD_SAVE_DEBOUNCE_MS);
    });

    // --- 初期化 ---
    setSpeed(speed);       // 両画面の表示値をそろえる
    setFontSize(fontSize);
    if (!SR) {
      voiceBtn.disabled = true;
      voiceBtn.style.opacity = '0.4';
      voiceBtn.style.cursor = 'not-allowed';
      voiceBtn.title = 'この端末は音声認識に非対応です';
    }
    loadFromCloud(false);  // 起動時に自動取得(iPadで開くと台本が入っている)
  </script>
</body>
</html>
