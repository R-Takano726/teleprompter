<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プロンプター</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Yu Gothic', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      height: 100vh;
      overflow: hidden;
    }

    /* ==================== Edit Screen ==================== */
    #editScreen {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 20px;
      gap: 14px;
    }

    #editScreen h1 {
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      color: #4fc3f7;
      letter-spacing: 4px;
    }

    #scriptInput {
      flex: 1;
      background: #080812;
      color: #e8e8e8;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 16px;
      font-size: 15px;
      line-height: 1.7;
      resize: none;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    #scriptInput:focus {
      border-color: #4fc3f7;
    }

    #scriptInput::placeholder {
      color: #444;
    }

    .settings-row {
      display: flex;
      gap: 20px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .setting-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .setting-group label {
      font-size: 12px;
      color: #888;
      letter-spacing: 1px;
    }

    .setting-group .val {
      color: #4fc3f7;
      font-weight: bold;
    }

    input[type="range"] {
      width: 130px;
      accent-color: #4fc3f7;
      cursor: pointer;
    }

    .mirror-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .mirror-row span {
      font-size: 12px;
      color: #888;
      margin-right: 4px;
      letter-spacing: 1px;
    }

    .toggle-btn {
      padding: 7px 16px;
      border: 1px solid #3a3a5a;
      border-radius: 6px;
      background: transparent;
      color: #aaa;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      transition: all 0.15s;
    }

    .toggle-btn:hover {
      border-color: #4fc3f7;
      color: #4fc3f7;
    }

    .toggle-btn.active {
      background: #4fc3f7;
      color: #000;
      border-color: #4fc3f7;
      font-weight: bold;
    }

    #startBtn {
      align-self: center;
      padding: 14px 48px;
      background: linear-gradient(135deg, #4fc3f7, #0288d1);
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 2px;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: 0 4px 20px rgba(79, 195, 247, 0.3);
    }

    #startBtn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    #startBtn:active {
      transform: translateY(0);
    }

    /* ==================== Prompter Screen ==================== */
    #prompterScreen {
      display: none;
      flex-direction: column;
      height: 100vh;
      background: #000;
      position: relative;
    }

    #prompterWrapper {
      flex: 1;
      overflow: scroll;
      position: relative;
      scrollbar-width: none;
    }

    #prompterWrapper::-webkit-scrollbar {
      display: none;
    }

    #prompterContent {
      padding: 30vh 5% 80vh;
      font-size: 32px;
      line-height: 1.6;
      color: #fff;
      width: 100%;
      word-break: break-word;
      overflow-wrap: break-word;
      white-space: pre-wrap;
    }

    /* 左右反転: レイアウト全体を鏡映 (ビームスプリッタ用) */
    #prompterContent.mirror-h {
      transform: scaleX(-1);
    }

    /* 上下反転: 行の順序・スクロールはそのまま、各行の文字だけ上下反転 */
    #prompterContent.mirror-v .line {
      transform: scaleY(-1);
    }

    /* 音声追従中: いま喋っている行をうっすら帯ハイライト(現在地の目印) */
    #prompterContent .line.reading {
      background: rgba(79, 195, 247, 0.16);
      border-radius: 6px;
    }

    /* カラオケ式: 読み終えた文字を色付け(左から流れていく) */
    #prompterContent .ch.spoken {
      color: #ffd54f;
    }

    /* 読み間違い/読み飛ばした文字を赤く表示(spokenより優先) */
    #prompterContent .ch.misread {
      color: #ff5252;
      font-weight: bold;
    }

    /* 迷子: 喋っているのに台本に追従できていない行(読み間違い/言い換え) */
    #prompterContent .line.reading.diverged {
      background: rgba(255, 152, 0, 0.28);
    }

    /* 英単語・型番などを途中改行させない */
    #prompterContent .word {
      white-space: nowrap;
    }

    /* Markdown heading colors */
    #prompterContent .h1 {
      color: #ffeb3b;
      font-weight: bold;
      font-size: 1.2em;
      margin: 0.2em 0 0.1em;
      display: block;
    }

    #prompterContent .h2 {
      color: #4fc3f7;
      font-weight: bold;
      font-size: 1.1em;
      margin: 0.15em 0 0.05em;
      display: block;
    }

    #prompterContent .h3 {
      color: #a5d6a7;
      font-weight: bold;
      font-size: 1.0em;
      margin: 0.1em 0 0.05em;
      display: block;
    }

    #prompterContent .empty-line {
      display: block;
      height: 0.4em;
    }

    /* Markdown list items */
    #prompterContent .li-ul,
    #prompterContent .li-ol {
      display: block;
      padding-left: 1.8em;
      position: relative;
    }

    #prompterContent .li-marker {
      position: absolute;
      left: 0;
    }

    #prompterContent .li-ul .li-marker {
      color: #4fc3f7;
    }

    #prompterContent .li-ol .li-marker {
      color: #ffb74d;
      min-width: 1.6em;
      display: inline-block;
    }

    /* ==================== Prompter Controls ==================== */
    #prompterControls {
      background: rgba(10, 10, 20, 0.95);
      border-top: 1px solid #222;
      padding: 8px 10px;
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      flex-shrink: 0;
      backdrop-filter: blur(10px);
    }

    #prompterControls .toggle-btn {
      padding: 6px 11px;
      font-size: 12px;
    }

    .ctrl-btn {
      padding: 6px 10px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #111;
      color: #ccc;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .ctrl-btn:hover {
      background: #222;
      border-color: #555;
    }

    #playBtn {
      background: #1a3a1a;
      color: #a5d6a7;
      border-color: #2d5a2d;
      font-weight: bold;
      min-width: 90px;
    }

    #playBtn:hover {
      background: #224a22;
    }

    #stopBtn {
      color: #ef9a9a;
      border-color: #3a1a1a;
    }

    .ctrl-group {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .ctrl-group-label {
      font-size: 11px;
      color: #555;
      margin-right: 2px;
    }

    .ctrl-val {
      color: #4fc3f7;
      font-size: 13px;
      font-weight: bold;
      min-width: 24px;
      text-align: center;
    }

    .separator {
      width: 1px;
      height: 24px;
      background: #333;
      margin: 0 4px;
    }

    .shortcut-hint {
      font-size: 11px;
      color: #444;
      margin-left: auto;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    @media (max-width: 1100px) {
      .shortcut-hint {
        display: none;
      }
    }
  </style>
</head>
<body>

  <!-- ==================== Edit Screen ==================== -->
  <div id="editScreen">
    <h1>TELEPROMPTER</h1>

    <textarea
      id="scriptInput"
      placeholder="台本をここに貼り付けてください...&#10;&#10;Markdown形式に対応しています:&#10;# 大見出し (黄色)&#10;## 中見出し (水色)&#10;### 小見出し (緑色)&#10;- 箇条書き (水色の•)&#10;1. 番号付きリスト (オレンジの番号)"
    ></textarea>

    <div class="settings-row">
      <div class="setting-group">
        <label>スクロール速度: <span class="val" id="speedVal">2</span></label>
        <input type="range" id="speedRange" min="1" max="20" value="2">
      </div>
      <div class="setting-group">
        <label>フォントサイズ: <span class="val" id="fontVal">60</span> px</label>
        <input type="range" id="fontRange" min="16" max="80" value="60">
      </div>
      <div class="setting-group">
        <label>反転オプション</label>
        <div class="mirror-row">
          <span>反転:</span>
          <button class="toggle-btn active" id="mirrorHBtn">左右</button>
          <button class="toggle-btn" id="mirrorVBtn">上下</button>
        </div>
      </div>
    </div>

    <button id="startBtn">▶ プロンプター開始</button>
  </div>

  <!-- ==================== Prompter Screen ==================== -->
  <div id="prompterScreen">
    <div id="prompterWrapper">
      <div id="prompterContent"></div>
    </div>

    <div id="prompterControls">
      <button class="ctrl-btn" id="stopBtn">✕ 終了</button>

      <div class="separator"></div>

      <button class="ctrl-btn" id="playBtn">⏸ 一時停止</button>

      <button class="ctrl-btn" id="rewindBtn">⏪ 戻る</button>
      <button class="ctrl-btn" id="forwardBtn">進む ⏩</button>

      <div class="separator"></div>

      <div class="ctrl-group">
        <span class="ctrl-group-label">速度</span>
        <button class="ctrl-btn" id="speedDownBtn">−</button>
        <span class="ctrl-val" id="speedDisplay">5</span>
        <button class="ctrl-btn" id="speedUpBtn">＋</button>
      </div>

      <div class="ctrl-group">
        <span class="ctrl-group-label">サイズ</span>
        <button class="ctrl-btn" id="fontDownBtn">A−</button>
        <span class="ctrl-val" id="fontDisplay">60</span>
        <button class="ctrl-btn" id="fontUpBtn">A＋</button>
      </div>

      <div class="separator"></div>

      <div class="ctrl-group">
        <span class="ctrl-group-label">反転</span>
        <button class="toggle-btn active" id="pMirrorHBtn">左右</button>
        <button class="toggle-btn" id="pMirrorVBtn">上下</button>
      </div>

      <div class="separator"></div>

      <button class="toggle-btn" id="voiceBtn" title="喋ったペースに合わせて自動でスクロール">🎤 音声追従</button>

      <span class="shortcut-hint">
        スペース: 一時停止 &nbsp;|&nbsp; ←→ / ↑↓: 移動 &nbsp;|&nbsp; +−: 速度 &nbsp;|&nbsp; ホイール: スクロール
      </span>
    </div>
  </div>

  <script>
    // ==================== State ====================
    let isPlaying = false;
    let speed = 2;
    let fontSize = 60;
    let mirrorH = true;
    let mirrorV = false;
    let scrollPos = 0;
    let lastTime = null;
    let rafId = null;

    const STEP_AMOUNT = 300; // pixels per rewind/forward step

    // ==================== Voice-follow State ====================
    let voiceMode = false;      // 音声追従ON/OFF
    let voiceWantOn = false;    // 自動再開の意図フラグ
    let voiceTarget = null;     // 追従先スクロール位置(px)。nullなら停止
    let voiceNorm = '';         // 台本を正規化した連結文字列
    let voiceLineRanges = [];   // [{start, end, el}] norm内の各行範囲→DOM
    let voiceIndex = 0;         // 現在読んでいるnorm内位置
    let voiceChars = [];        // [{span, normPos}] 1文字ずつのspanとnorm位置(カラオケ用)
    let spokenCount = 0;        // いま色付けしている先頭からの文字数
    let readingEl = null;       // いまハイライト中の行要素
    let recognition = null;
    let recognitionRunning = false;
    let recognitionStarting = false; // start()〜onstart の間
    let restartTimer = null;    // onend後の再開タイマー
    let lastVoiceProc = 0;      // 認識結果の処理スロットル用
    let lastManualAnchorAt = 0; // 手動補正直後は音声更新を少し無視する
    let lastResultAt = 0;       // 最後に認識結果が来た時刻(=喋っている)
    let lastAdvanceAt = 0;      // 最後にハイライトが前進した時刻
    let stalledSinceAdvance = false; // 前進前にマッチ停止があったか(読み間違い検知用)
    const VOICE_EASE = 4;       // 追従のなめらかさ(大きいほど速く追従)
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

    // ==================== Elements ====================
    const editScreen    = document.getElementById('editScreen');
    const prompterScreen  = document.getElementById('prompterScreen');
    const scriptInput   = document.getElementById('scriptInput');
    const prompterWrapper = document.getElementById('prompterWrapper');
    const prompterContent = document.getElementById('prompterContent');

    const speedRange = document.getElementById('speedRange');
    const fontRange  = document.getElementById('fontRange');
    const speedVal   = document.getElementById('speedVal');
    const fontVal    = document.getElementById('fontVal');
    const mirrorHBtn = document.getElementById('mirrorHBtn');
    const mirrorVBtn = document.getElementById('mirrorVBtn');
    const startBtn   = document.getElementById('startBtn');

    const stopBtn       = document.getElementById('stopBtn');
    const playBtn       = document.getElementById('playBtn');
    const rewindBtn     = document.getElementById('rewindBtn');
    const forwardBtn    = document.getElementById('forwardBtn');
    const speedDownBtn  = document.getElementById('speedDownBtn');
    const speedUpBtn    = document.getElementById('speedUpBtn');
    const fontDownBtn   = document.getElementById('fontDownBtn');
    const fontUpBtn     = document.getElementById('fontUpBtn');
    const speedDisplay  = document.getElementById('speedDisplay');
    const fontDisplay   = document.getElementById('fontDisplay');
    const pMirrorHBtn   = document.getElementById('pMirrorHBtn');
    const pMirrorVBtn   = document.getElementById('pMirrorVBtn');
    const voiceBtn      = document.getElementById('voiceBtn');

    // ==================== Script Renderer + Voice Index ====================
    // 台本をDOM化しつつ、音声追従用インデックス(voiceNorm / voiceLineRanges / voiceChars)も構築する。
    // 各文字を <span class="ch"> にして、カラオケ式に読んだ所だけ色付けできるようにしている。
    // 各行は block(.line)。上下反転は .line ごとに scaleY(-1) するため行順・スクロールは保たれる。
    function isWordChar(ch) { return /[\p{L}\p{N}]/u.test(ch); }

    // 1行分のテキストを1文字ずつ span 化して div に追加し、voiceNorm / voiceChars を更新。
    // 連続する英数字は .word(nowrap) でまとめ、英単語が途中改行されないようにする。
    function appendChars(div, content) {
      let bold = false;
      let run = null; // 英数字をまとめる nowrap ラッパ
      for (let i = 0; i < content.length; i++) {
        if (content[i] === '*' && content[i + 1] === '*') { bold = !bold; i++; continue; } // **太字**
        const ch = content[i];
        if (/[A-Za-z0-9]/.test(ch)) {
          if (!run) { run = document.createElement('span'); run.className = 'word'; div.appendChild(run); }
        } else {
          run = null; // 日本語等は自由に折り返す
        }
        const span = document.createElement('span');
        span.className = 'ch';
        if (bold) span.style.fontWeight = 'bold';
        span.textContent = ch;
        (run || div).appendChild(span);
        if (isWordChar(ch)) voiceNorm += ch.toLowerCase(); // normalizeText と同じ正規化
        voiceChars.push({ span, normPos: voiceNorm.length });
      }
    }

    function buildPrompter(text) {
      prompterContent.innerHTML = '';
      voiceNorm = '';
      voiceLineRanges = [];
      voiceChars = [];
      voiceIndex = 0;
      voiceTarget = null;
      readingEl = null;
      spokenCount = 0;

      text.split('\n').forEach(raw => {
        const div = document.createElement('div');
        div.className = 'line';
        let content = raw;

        if (/^### /.test(raw)) { div.classList.add('h3'); content = raw.slice(4); }
        else if (/^## /.test(raw)) { div.classList.add('h2'); content = raw.slice(3); }
        else if (/^# /.test(raw)) { div.classList.add('h1'); content = raw.slice(2); }
        else if (/^(\s*)[*-] /.test(raw)) {
          const m = raw.match(/^(\s*)[*-] (.*)/);
          div.classList.add('li-ul');
          if (m[1].length) div.style.paddingLeft = (1.8 + m[1].length * 0.8) + 'em';
          const marker = document.createElement('span');
          marker.className = 'li-marker'; marker.textContent = '•';
          div.appendChild(marker);
          content = m[2];
        } else if (/^\s*\d+\. /.test(raw)) {
          const m = raw.match(/^(\s*)(\d+)\. (.*)/);
          div.classList.add('li-ol');
          if (m[1].length) div.style.paddingLeft = (1.8 + m[1].length * 0.8) + 'em';
          const marker = document.createElement('span');
          marker.className = 'li-marker'; marker.textContent = m[2] + '.';
          div.appendChild(marker);
          content = m[3];
        } else if (raw.trim() === '') {
          div.classList.add('empty-line');
          prompterContent.appendChild(div);
          return; // 空行: 文字・範囲なし
        }

        const start = voiceNorm.length;
        appendChars(div, content);
        voiceLineRanges.push({ start, end: voiceNorm.length, el: div });
        prompterContent.appendChild(div);
      });
    }

    // カラオケ式ハイライト: voiceIndex までの文字に .spoken を付与/解除(増分処理で軽量)
    function updateKaraoke() {
      while (spokenCount < voiceChars.length && voiceChars[spokenCount].normPos <= voiceIndex) {
        voiceChars[spokenCount].span.classList.add('spoken');
        spokenCount++;
      }
      while (spokenCount > 0 && voiceChars[spokenCount - 1].normPos > voiceIndex) {
        spokenCount--;
        voiceChars[spokenCount].span.classList.remove('spoken');
      }
    }

    // ==================== Viewport height (iOS Safariの100vhズレ対策) ====================
    // 古いiPadでは 100vh が実際の表示高さより大きく、下のコントロールバーが画面外に
    // はみ出す。実ビューポート(window.innerHeight)で高さを固定して防ぐ。
    function syncPrompterHeight() {
      if (prompterScreen.style.display !== 'none') {
        prompterScreen.style.height = window.innerHeight + 'px';
      }
    }
    window.addEventListener('resize', syncPrompterHeight);
    window.addEventListener('orientationchange', () => setTimeout(syncPrompterHeight, 200));

    // ==================== Mirror ====================
    function applyMirror() {
      prompterContent.classList.toggle('mirror-h', mirrorH);
      prompterContent.classList.toggle('mirror-v', mirrorV);
      pMirrorHBtn.classList.toggle('active', mirrorH);
      pMirrorVBtn.classList.toggle('active', mirrorV);
      // 編集画面側のボタン表示も同期(プロンプター中に切り替えても次回ズレない)
      mirrorHBtn.classList.toggle('active', mirrorH);
      mirrorVBtn.classList.toggle('active', mirrorV);
    }

    // ==================== Edit Screen Controls ====================
    speedRange.addEventListener('input', () => {
      speed = parseInt(speedRange.value);
      speedVal.textContent = speed;
    });

    fontRange.addEventListener('input', () => {
      fontSize = parseInt(fontRange.value);
      fontVal.textContent = fontSize;
    });

    mirrorHBtn.addEventListener('click', () => {
      mirrorH = !mirrorH;
      mirrorHBtn.classList.toggle('active', mirrorH);
    });

    mirrorVBtn.addEventListener('click', () => {
      mirrorV = !mirrorV;
      mirrorVBtn.classList.toggle('active', mirrorV);
    });

    startBtn.addEventListener('click', () => {
      const text = scriptInput.value.trim();
      if (!text) {
        scriptInput.focus();
        scriptInput.style.borderColor = '#ef5350';
        setTimeout(() => { scriptInput.style.borderColor = ''; }, 800);
        return;
      }

      // Render
      buildPrompter(text);
      prompterContent.style.fontSize = fontSize + 'px';
      applyMirror();

      // Switch screens
      editScreen.style.display = 'none';
      prompterScreen.style.display = 'flex';
      syncPrompterHeight();

      // Reset
      scrollPos = 0;
      prompterWrapper.scrollTop = 0;

      // Start
      isPlaying = true;
      updatePlayBtn();
      updateSpeedDisplay();
      updateFontDisplay();
      startAnimation();
    });

    // ==================== Animation Loop ====================
    function startAnimation() {
      if (rafId) cancelAnimationFrame(rafId);
      lastTime = null;

      function animate(timestamp) {
        if (lastTime === null) lastTime = timestamp;
        const delta = timestamp - lastTime;
        lastTime = timestamp;

        if (isPlaying) {
          const maxScroll = prompterWrapper.scrollHeight - prompterWrapper.clientHeight;

          if (voiceMode) {
            // 喋ったペースに合わせて、目標位置へなめらかに追従
            if (voiceTarget !== null) {
              const t = Math.min(1, (delta / 1000) * VOICE_EASE);
              scrollPos += (voiceTarget - scrollPos) * t;
            }
            // 迷子検知: 喋っているのに一定時間ハイライトが進まない＝台本から外れている
            if (readingEl) {
              const lost = (timestamp - lastResultAt < DIVERGE_ACTIVE_MS)
                        && (timestamp - lastAdvanceAt > DIVERGE_STUCK_MS);
              readingEl.classList.toggle('diverged', lost);
            }
          } else {
            // speed 1-20 → 15-300 px/sec
            const pxPerSec = speed * 15;
            scrollPos += pxPerSec * delta / 1000;
            if (scrollPos >= maxScroll) {
              scrollPos = maxScroll;
              isPlaying = false;
              updatePlayBtn();
            }
          }

          scrollPos = Math.max(0, Math.min(maxScroll, scrollPos));
          prompterWrapper.scrollTop = scrollPos;
        }

        rafId = requestAnimationFrame(animate);
      }

      rafId = requestAnimationFrame(animate);
    }

    // ==================== Voice-follow ====================
    function nowMs() { return performance.now ? performance.now() : Date.now(); }

    // 句読点・空白を落とし、文字/数字のみ小文字化して照合用に正規化
    function normalizeText(s) {
      return (s || '').replace(/[^\p{L}\p{N}]/gu, '').toLowerCase();
    }

    function rangeForIndex() {
      // 行境界(前行end==次行start)では次行を選ぶ。最後の行だけ末尾を含める。
      for (let i = 0; i < voiceLineRanges.length; i++) {
        if (voiceIndex < voiceLineRanges[i].end || i === voiceLineRanges.length - 1) {
          return voiceLineRanges[i];
        }
      }
      return voiceLineRanges[voiceLineRanges.length - 1];
    }

    // いま喋っている行をハイライト(色変更)。切り替わった時だけDOMを触る。
    function setReadingHighlight(el) {
      if (readingEl === el) return;
      if (readingEl) readingEl.classList.remove('reading', 'diverged');
      readingEl = el || null;
      if (readingEl) readingEl.classList.add('reading');
    }

    // voiceIndex(norm内位置) → 追従先スクロール位置(px)を算出＋現在行をハイライト
    function voiceIndexToTarget() {
      const range = rangeForIndex();
      if (!range) return;
      setReadingHighlight(range.el);
      updateKaraoke();
      const frac = (voiceIndex - range.start) / Math.max(1, range.end - range.start);
      const y = range.el.offsetTop + frac * range.el.offsetHeight;
      // 読んでいる位置を画面の40%付近に置く
      voiceTarget = y - prompterWrapper.clientHeight * 0.4;
    }

    // 現在のスクロール位置(画面40%)に対応する norm 位置を返す
    function readingNormIndex() {
      const y = scrollPos + prompterWrapper.clientHeight * 0.4;
      for (const r of voiceLineRanges) {
        if (y <= r.el.offsetTop + r.el.offsetHeight) return r.start;
      }
      return voiceNorm.length;
    }

    // 手動補正時: 音声の基準を今の表示位置に合わせ、勝手に元へ戻らないようにする
    let anchorScheduled = false;
    function anchorVoiceToScroll() {
      // 手動ドラッグで連続発火するので、1フレーム1回に間引く(古いiPad対策)
      if (!voiceMode || anchorScheduled) return;
      anchorScheduled = true;
      requestAnimationFrame(() => {
        anchorScheduled = false;
        if (!voiceMode) return;
        voiceIndex = readingNormIndex();
        voiceTarget = null; // 次に喋るまで動かさない
        const range = rangeForIndex();
        if (range) setReadingHighlight(range.el);
        updateKaraoke();
        lastManualAnchorAt = nowMs();
        lastAdvanceAt = nowMs(); // 手動補正直後は迷子扱いしない
        stalledSinceAdvance = false;
      });
    }

    const BACK_PENALTY = 4;   // 後退一致のコスト倍率(前進を優先しつつ言い直しは許す)
    const MAX_NEAR_JUMP = 24; // これ以上の前方ジャンプは高確信(長い一致)時のみ許可
    const CONFIDENT_LEN = 10; // 大きく進むのを許可する一致長(文字)
    const DIVERGE_STUCK_MS = 2000;  // 喋っているのにこの時間進まなければ「迷子」とみなす
    const DIVERGE_ACTIVE_MS = 1500; // 直近この時間内に認識があれば「喋っている」
    const MISREAD_MAX = 16;         // この長さ以下の読み飛ばし区間を「読み間違い」として赤く出す

    // 認識テキストの末尾と台本を照合し、追従先スクロール位置を更新
    function updateVoicePosition(transcript) {
      if (!voiceMode || !isPlaying || !voiceNorm) return;
      const now = nowMs();
      if (now - lastVoiceProc < 150) return;       // 旧iPadの負荷軽減: 処理を間引く
      if (now - lastManualAnchorAt < 500) return;  // 手動補正直後は音声で戻さない
      lastVoiceProc = now;

      const spoken = normalizeText(transcript);
      if (spoken.length < 6) return; // 短すぎる断片は誤マッチしやすいので無視

      // 現在地の少し手前〜前方だけを探索窓にする(長文台本でも軽い & 言い直しに対応)
      const behind = 40;   // 言い直し・小さな戻りを許容する後方幅
      const ahead = 400;   // 飛びすぎ防止の前方幅
      const hayStart = Math.max(0, voiceIndex - behind);
      const hay = voiceNorm.slice(hayStart, Math.min(voiceNorm.length, voiceIndex + ahead));

      // 末尾を長め→短めに。各候補の「採用可否」を選別時に判定し、採用候補が取れた長さで確定する。
      // 採用可: 後退(=言い直し) / 近接の前進(jump<=MAX_NEAR_JUMP) / 長い一致(高確信, L>=CONFIDENT_LEN)。
      // 読み間違い対策: 短い一致での大きな前方ジャンプは採用しない(=誤読/偶然一致は無視して現在地を保つ)。
      //   例:「具体的には」を先にある「物理的に」と読んでも飛ばない。続けて正しい語を読めば近接一致で再追従。
      let bestEnd = -1, bestScore = Infinity, bestLen = 0;
      for (let L = Math.min(16, spoken.length); L >= 6; L--) {
        const needle = spoken.slice(-L);
        let from = 0, foundEligible = false;
        while (true) {
          const rel = hay.indexOf(needle, from);
          if (rel === -1) break;
          const end = hayStart + rel + L;
          const diff = end - voiceIndex;
          const eligible = diff <= MAX_NEAR_JUMP || L >= CONFIDENT_LEN;
          if (eligible) {
            const score = diff >= 0 ? diff : (-diff) * BACK_PENALTY; // 後退は割高に
            if (score < bestScore) { bestScore = score; bestEnd = end; bestLen = L; }
            foundEligible = true;
          }
          from = rel + 1;
        }
        if (foundEligible) break; // 採用候補が取れたら確定(より長い=高確信を優先)
      }
      if (bestEnd === -1) { stalledSinceAdvance = true; return; } // 一致せず停止(誤読語で起きる)

      const prevIndex = voiceIndex;
      voiceIndex = bestEnd;
      lastAdvanceAt = now; // 台本に一致して進んだ=迷子解除
      voiceIndexToTarget();

      // 読み間違い検知: 「誤読語で一旦マッチが止まり、続けて正しい語で先へ飛ぶ」順序のときだけ、
      // 飛ばされた隙間(=誤読/読み飛ばした語)を赤くマークする。停止なしの前方スキップや
      // 暫定認識のブレ・ASRの取りこぼしは赤にしない(偽陽性を抑制)。
      const matchStart = bestEnd - bestLen;
      const gap = matchStart - prevIndex;
      // 一致した区間は正しく読めた証拠なので赤を消す(言い直して正しく読み直すと赤が取れる)
      setMisread(matchStart, bestEnd, false);
      // 誤読語で停止→先へ飛んだ隙間は読み間違いとして赤に
      if (stalledSinceAdvance && gap >= 1 && gap <= MISREAD_MAX) setMisread(prevIndex, matchStart, true);
      stalledSinceAdvance = false;
    }

    // norm位置 (from, to] に含まれる文字spanの .misread を付与/除去する
    function setMisread(from, to, on) {
      for (let i = 0; i < voiceChars.length; i++) {
        const p = voiceChars[i].normPos;
        if (p <= from) continue;
        if (p > to) break;
        voiceChars[i].span.classList.toggle('misread', on);
      }
    }

    // 認識を動かすべき条件: ユーザーがONにしていて、かつ再生中(=一時停止中は止めて省電力)
    function shouldListen() { return voiceWantOn && isPlaying; }

    // start()重複(InvalidStateError)を防ぐ安全な開始。starting/runningの間は呼ばない。
    function safeStart() {
      if (!recognition || recognitionRunning || recognitionStarting) return;
      recognitionStarting = true;
      try { recognition.start(); } catch (_) { recognitionStarting = false; }
    }

    function scheduleVoiceRestart(delay) {
      if (restartTimer) return; // 二重予約しない(再起動ループ防止)
      restartTimer = setTimeout(() => {
        restartTimer = null;
        if (shouldListen()) safeStart();
      }, delay);
    }

    function setupRecognition() {
      const r = new SR();
      r.lang = 'ja-JP';
      r.continuous = true;
      r.interimResults = true;
      r.onstart = () => { recognitionStarting = false; recognitionRunning = true; };
      r.onresult = (e) => {
        lastResultAt = nowMs(); // 喋っている証拠(迷子判定用)
        const last = e.results[e.results.length - 1];
        if (last) updateVoicePosition(last[0].transcript);
      };
      r.onend = () => {
        recognitionStarting = false;
        recognitionRunning = false;
        // iOS Safari等は勝手に止まるので、ONのままなら少し待って再開(間隔を空けてループ防止)
        if (shouldListen()) scheduleVoiceRestart(300);
      };
      r.onerror = (e) => {
        recognitionStarting = false;
        if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
          stopVoice();
          alert('マイクが使えませんでした。設定でマイク許可を確認してください。');
        }
        // no-speech / aborted / network 等は onend → 再開に任せる(間隔あり)
      };
      return r;
    }

    // 状態に合わせて認識を開始/停止する一元化ヘルパー
    function syncVoiceRecognition() {
      if (!recognition) return;
      if (shouldListen()) {
        safeStart();
      } else {
        if (restartTimer) { clearTimeout(restartTimer); restartTimer = null; }
        if (recognitionRunning || recognitionStarting) { try { recognition.stop(); } catch (_) {} }
      }
    }

    function updateVoiceBtn() {
      voiceBtn.classList.toggle('active', voiceMode);
      voiceBtn.textContent = voiceMode ? '🎤 音声追従 ON' : '🎤 音声追従';
    }

    function startVoice() {
      if (!SR) { alert('この端末/ブラウザは音声認識に対応していません。'); return; }
      if (!recognition) recognition = setupRecognition();
      voiceWantOn = true;
      voiceMode = true;
      lastResultAt = 0;       // 開始直後は迷子扱いしない
      lastAdvanceAt = nowMs();
      stalledSinceAdvance = false;
      // 照合インデックスは buildPrompter(描画時)で構築済み。今の表示位置から追従を再開。
      anchorVoiceToScroll();
      // 追従できるよう再生状態にする
      if (!isPlaying) { isPlaying = true; updatePlayBtn(); if (!rafId) startAnimation(); }
      syncVoiceRecognition();
      updateVoiceBtn();
    }

    function stopVoice() {
      voiceWantOn = false;
      voiceMode = false;
      voiceTarget = null;
      setReadingHighlight(null); // ハイライト解除
      if (restartTimer) { clearTimeout(restartTimer); restartTimer = null; }
      if (recognition && (recognitionRunning || recognitionStarting)) { try { recognition.stop(); } catch (_) {} }
      updateVoiceBtn();
    }

    voiceBtn.addEventListener('click', () => {
      if (voiceMode) stopVoice(); else startVoice();
    });

    if (!SR) {
      voiceBtn.disabled = true;
      voiceBtn.style.opacity = '0.4';
      voiceBtn.style.cursor = 'not-allowed';
      voiceBtn.title = 'この端末は音声認識に非対応です';
    }

    // ==================== Prompter Controls ====================
    stopBtn.addEventListener('click', () => {
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
      isPlaying = false;
      stopVoice();
      editScreen.style.display = 'flex';
      prompterScreen.style.display = 'none';
    });

    playBtn.addEventListener('click', togglePlay);

    function togglePlay() {
      isPlaying = !isPlaying;
      updatePlayBtn();
      if (isPlaying && !rafId) startAnimation();
      if (!isPlaying && readingEl) readingEl.classList.remove('diverged'); // 停止中はオレンジを消す
      syncVoiceRecognition(); // 一時停止/再開で認識も止める/再開する
    }

    function updatePlayBtn() {
      playBtn.textContent = isPlaying ? '⏸ 一時停止' : '▶ 再生';
    }

    rewindBtn.addEventListener('click', () => {
      scrollPos = Math.max(0, scrollPos - STEP_AMOUNT);
      prompterWrapper.scrollTop = scrollPos;
      anchorVoiceToScroll();
    });

    forwardBtn.addEventListener('click', () => {
      const max = prompterWrapper.scrollHeight - prompterWrapper.clientHeight;
      scrollPos = Math.min(max, scrollPos + STEP_AMOUNT);
      prompterWrapper.scrollTop = scrollPos;
      anchorVoiceToScroll();
    });

    function updateSpeedDisplay() { speedDisplay.textContent = speed; }
    function updateFontDisplay()  { fontDisplay.textContent = fontSize; }

    speedDownBtn.addEventListener('click', () => {
      speed = Math.max(1, speed - 1);
      updateSpeedDisplay();
    });
    speedUpBtn.addEventListener('click', () => {
      speed = Math.min(20, speed + 1);
      updateSpeedDisplay();
    });

    fontDownBtn.addEventListener('click', () => {
      fontSize = Math.max(16, fontSize - 4);
      prompterContent.style.fontSize = fontSize + 'px';
      updateFontDisplay();
    });
    fontUpBtn.addEventListener('click', () => {
      fontSize = Math.min(80, fontSize + 4);
      prompterContent.style.fontSize = fontSize + 'px';
      updateFontDisplay();
    });

    pMirrorHBtn.addEventListener('click', () => { mirrorH = !mirrorH; applyMirror(); });
    pMirrorVBtn.addEventListener('click', () => { mirrorV = !mirrorV; applyMirror(); });

    // ==================== Mouse Wheel ====================
    prompterWrapper.addEventListener('wheel', (e) => {
      e.preventDefault();
      scrollPos += e.deltaY;
      scrollPos = Math.max(0, scrollPos);
      const max = prompterWrapper.scrollHeight - prompterWrapper.clientHeight;
      scrollPos = Math.min(max, scrollPos);
      prompterWrapper.scrollTop = scrollPos;
      anchorVoiceToScroll();
    }, { passive: false });

    // ==================== Touch (tablet swipe) ====================
    let touchStartY = 0;
    prompterWrapper.addEventListener('touchstart', (e) => {
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    prompterWrapper.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const dy = touchStartY - e.touches[0].clientY;
      scrollPos += dy * 1.5;
      scrollPos = Math.max(0, scrollPos);
      const max = prompterWrapper.scrollHeight - prompterWrapper.clientHeight;
      scrollPos = Math.min(max, scrollPos);
      prompterWrapper.scrollTop = scrollPos;
      touchStartY = e.touches[0].clientY;
      anchorVoiceToScroll();
    }, { passive: false });

    // ==================== Keyboard Shortcuts ====================
    document.addEventListener('keydown', (e) => {
      if (prompterScreen.style.display === 'none') return;

      switch (e.key) {
        case ' ':
          e.preventDefault();
          togglePlay();
          break;

        case 'ArrowLeft':
        case 'ArrowUp':
          e.preventDefault();
          scrollPos = Math.max(0, scrollPos - STEP_AMOUNT);
          prompterWrapper.scrollTop = scrollPos;
          anchorVoiceToScroll();
          break;

        case 'ArrowRight':
        case 'ArrowDown':
          e.preventDefault();
          {
            const max = prompterWrapper.scrollHeight - prompterWrapper.clientHeight;
            scrollPos = Math.min(max, scrollPos + STEP_AMOUNT);
            prompterWrapper.scrollTop = scrollPos;
            anchorVoiceToScroll();
          }
          break;

        case '+':
        case '=':
          speed = Math.min(20, speed + 1);
          updateSpeedDisplay();
          break;

        case '-':
        case '_':
          speed = Math.max(1, speed - 1);
          updateSpeedDisplay();
          break;
      }
    });
  </script>
</body>
</html>
